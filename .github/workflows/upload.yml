name: Auto Social Upload
on:
  workflow_dispatch: # 이 문구가 있어야 'Run workflow' 버튼이 생깁니다!
  schedule:
    - cron: '0 2 * * *'  # 한국 오전 11시
    - cron: '0 4 * * *'  # 한국 오후 1시

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib requests
      - name: Run Uploader
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: python uploader.py
